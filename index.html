<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Typing Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<style>
:root {
  --bg: #FAFAF8; --surface: #F1F0EC; --ink: #2A2926; --ink-muted: #8A8880;
  --accent: #5B7B7A; --correct: #7A9A6E; --error: #B5766A;
  --font-ui: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
  --radius: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font-ui);
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;user-select:none;-webkit-user-select:none;
}
.hidden{display:none!important}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}

#nav-bar{
  position:fixed;top:0;left:0;right:0;z-index:50;height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;pointer-events:none;
}
#nav-bar > *{pointer-events:all}
.nav-btn{
  background:none;border:none;color:var(--ink-muted);font-family:var(--font-ui);
  font-size:.75rem;font-weight:500;cursor:pointer;padding:4px 8px;
  border-radius:4px;transition:color .15s;letter-spacing:.3px;
}
.nav-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.nav-btn:hover{color:var(--ink)}
.nav-btn.home-link{font-family:var(--font-mono);font-size:.9rem;letter-spacing:-.5px;color:var(--ink-muted)}
.nav-btn.home-link:hover{color:var(--ink)}

#home h1{font-family:var(--font-mono);font-size:2.8rem;font-weight:500;letter-spacing:-2px;color:var(--ink)}
#home .sub{color:var(--ink-muted);font-size:.9rem;margin-bottom:12px;font-weight:400}
.modes{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:420px}
.mode-group{display:flex;gap:6px;align-items:center}
.mode-group + .mode-group::before{content:'';width:1px;height:20px;background:var(--surface);margin:0 4px}
.mode-btn{
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  padding:10px 18px;font-size:.8rem;font-family:var(--font-ui);font-weight:500;
  cursor:pointer;border-radius:var(--radius);transition:all .2s;min-width:64px;text-align:center;
}
.mode-btn:hover{background:var(--bg);border-color:rgba(91,123,122,0.2);color:var(--ink)}
.mode-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-btn.primary:hover{background:#6b8b8a;border-color:#6b8b8a}
.mode-btn:focus-visible,.result-actions button:focus-visible,.lb-controls button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.theme-presets button:focus-visible,.font-pair-select button:focus-visible,.caret-styles button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#view-lb{margin-top:8px;font-size:.8rem}

#settings-overlay{
  position:fixed;inset:0;background:rgba(42,41,38,0.3);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
#settings-overlay.open{opacity:1;pointer-events:all}
#settings-drawer{
  position:fixed;top:0;right:0;bottom:0;width:360px;max-width:90vw;
  background:var(--bg);border-left:1px solid var(--surface);z-index:201;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;padding:28px 24px;overflow-y:auto;
}
#settings-drawer.open{transform:translateX(0)}
#settings-drawer h3{font-family:var(--font-mono);font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:20px;letter-spacing:-.5px}
#settings-drawer .close-btn{position:absolute;top:20px;right:20px;background:none;border:none;color:var(--ink-muted);font-size:1.2rem;cursor:pointer;font-family:var(--font-ui)}
#settings-drawer .close-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#settings-drawer .close-btn:hover{color:var(--ink)}
.setting-group{margin-bottom:20px}
.setting-group .sglabel{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-muted);margin-bottom:8px}
.theme-presets{display:flex;gap:6px;flex-wrap:wrap}
.theme-presets button{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative}
.theme-presets button.active{border-color:var(--ink)}
.theme-presets button::after{content:'';position:absolute;inset:3px;border-radius:50%}
.theme-presets .tp-adept{background:#FAFAF8;border-color:#E0DDD6}
.theme-presets .tp-adept::after{background:#FAFAF8}
.theme-presets .tp-dusk{background:#1A1C1E;border-color:#2A2D30}
.theme-presets .tp-dusk::after{background:#1A1C1E}
.theme-presets .tp-mint{background:#F2F7F0;border-color:#D6E3D0}
.theme-presets .tp-mint::after{background:#F2F7F0}
.theme-presets .tp-clay{background:#F6F1EE;border-color:#E3D8D2}
.theme-presets .tp-clay::after{background:#F6F1EE}
.font-pair-select{display:flex;gap:4px;flex-wrap:wrap}
.font-pair-select button{
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  padding:6px 10px;font-size:.72rem;font-family:var(--font-ui);font-weight:500;
  cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap;
}
.font-pair-select button.active{border-color:var(--accent);color:var(--ink);background:var(--bg)}
.caret-styles{display:flex;gap:6px}
.caret-styles button{
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  padding:8px 16px;font-size:.8rem;font-family:var(--font-ui);font-weight:500;
  cursor:pointer;border-radius:6px;transition:all .15s;
}
.caret-styles button.active{border-color:var(--accent);color:var(--ink);background:var(--bg)}
.custom-color-row{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}
.custom-color-row label{font-size:.7rem;color:var(--ink-muted)}
.custom-color-row input[type=color]{width:28px;height:28px;border:1px solid var(--surface);border-radius:4px;cursor:pointer;padding:0;background:none}
#settings-trigger{
  position:fixed;bottom:20px;right:20px;z-index:50;
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  font-family:var(--font-ui);
}
#settings-trigger:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#settings-trigger:hover{color:var(--ink);border-color:rgba(91,123,122,0.3)}

#game-screen{padding:16px;gap:6px}
#game-stats{
  display:flex;gap:12px;align-items:center;justify-content:center;
  height:28px;opacity:0;transition:opacity .3s;
  font-family:var(--font-mono);font-size:.8rem;color:var(--ink-muted);letter-spacing:.2px;
}
#game-stats.visible{opacity:1}
#game-stats .stat-sep{color:var(--surface);font-size:.65rem}
#game-stats .stat-label{font-family:var(--font-ui);font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-muted);margin-right:2px}
#game-canvas{width:100%;max-width:820px;background:transparent;display:block;cursor:text;outline:none;border-radius:var(--radius);min-height:200px}
#progress-line{width:100%;max-width:820px;height:2px;background:var(--surface);border-radius:1px;overflow:hidden;opacity:0;transition:opacity .4s}
#progress-line.visible{opacity:1}
#progress-line-fill{height:100%;width:0%;background:var(--accent);border-radius:1px;transition:width .2s ease}

#combo-display{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(.8);
  pointer-events:none;font-family:var(--font-mono);font-size:2rem;font-weight:500;
  opacity:0;z-index:100;color:var(--ink-muted);transition:all .3s cubic-bezier(.4,0,.2,1);
}

#results{gap:8px}
#results.prepare #result-content{opacity:0;transform:translateY(12px) scale(.97)}
#results.go #result-content{opacity:1;transform:translateY(0) scale(1);transition:all .5s cubic-bezier(.4,0,.2,1)}
#result-content{max-width:520px;width:100%}
#results h2{font-family:var(--font-mono);font-size:1.6rem;font-weight:500;letter-spacing:-1px;color:var(--ink);margin-bottom:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.result-item{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid transparent}
.result-item .rlabel{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-muted)}
.result-item .rvalue{font-family:var(--font-mono);font-size:1.5rem;font-weight:500;margin-top:4px;color:var(--ink)}
.result-item .rvalue.green{color:var(--correct)}
.result-item .rvalue.red{color:var(--error)}
.result-item .rvalue.gold{color:var(--ink-muted)}
.sparkline-wrap{margin:4px 0;max-width:520px;width:100%}
.sparkline-wrap .slabel{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-muted);margin-bottom:4px}
#sparkline{width:100%;height:40px;background:var(--surface);border-radius:6px;display:block}
.result-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.result-actions button{
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  padding:10px 22px;font-size:.85rem;font-family:var(--font-ui);font-weight:500;
  cursor:pointer;border-radius:var(--radius);transition:all .2s;
}
.result-actions button:hover{background:var(--bg);border-color:rgba(91,123,122,0.2);color:var(--ink)}
.result-actions button.primary{background:var(--accent);color:#fff}
.result-actions button.primary:hover{background:#6b8b8a}

#leaderboard{width:100%;max-width:640px}
#leaderboard h2{font-family:var(--font-mono);font-size:1.6rem;font-weight:500;letter-spacing:-1px;color:var(--ink);margin-bottom:12px;text-align:center}
.lb-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.lb-controls button{
  background:var(--surface);border:1px solid transparent;color:var(--ink-muted);
  padding:6px 16px;font-size:.75rem;font-family:var(--font-ui);font-weight:500;cursor:pointer;border-radius:6px;transition:all .15s;
}
.lb-controls button:hover{background:var(--bg);border-color:rgba(91,123,122,0.15)}
.lb-controls button.active{background:var(--accent);color:#fff}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{text-align:left;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-muted);padding:8px 10px;border-bottom:1px solid var(--surface)}
.lb-table td{padding:8px 10px;border-bottom:1px solid var(--surface);font-size:.85rem;font-family:var(--font-mono);font-weight:450;color:var(--ink)}
.lb-table tr:hover td{background:var(--surface);border-radius:4px}
.lb-table .rank{color:var(--ink-muted);font-weight:400}
.empty-state{text-align:center;color:var(--ink-muted);padding:40px;font-size:.85rem}
.clear-btn{background:transparent;border:1px solid var(--error);color:var(--error);padding:6px 16px;font-size:.75rem;font-family:var(--font-ui);font-weight:500;cursor:pointer;border-radius:6px;margin-top:8px;transition:all .15s}
.clear-btn:hover{background:var(--error);color:#fff}

#app-footer{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--surface);letter-spacing:1px;pointer-events:none;z-index:1;font-family:var(--font-mono)}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  #settings-drawer{transition-duration:.01ms!important}
  #results #result-content{transition-duration:.01ms!important}
  #combo-display{transition-duration:.01ms!important}
  #progress-line-fill{transition-duration:.01ms!important}
}
@media(max-width:600px){
  #home h1{font-size:2rem}
  .mode-btn{padding:8px 14px;min-width:56px;font-size:.75rem}
  .mode-group+.mode-group::before{display:none}
  .modes{gap:4px;max-width:100%}
  .result-grid{grid-template-columns:1fr 1fr}
  #settings-drawer{width:100vw;max-width:100vw}
  #game-stats{font-size:.7rem;gap:8px}
}
[data-feather]{width:1em;height:1em;vertical-align:middle;margin-right:3px;stroke-width:1.8}
#settings-trigger [data-feather]{margin-right:0}
</style>
</head>
<body>

<nav id="nav-bar">
  <button class="nav-btn home-link" id="nav-home" title="home"><span data-feather="home"></span>⌨ adept</button>
  <button class="nav-btn" id="nav-lb" title="leaderboard"><span data-feather="award"></span>leaderboard</button>
</nav>

<div id="home" class="screen">
  <h1>⌨ adept</h1>
  <p class="sub">a typing challenge</p>
  <div class="modes">
    <div class="mode-group">
      <button class="mode-btn" data-mode="15">15s</button>
      <button class="mode-btn" data-mode="30">30s</button>
      <button class="mode-btn" data-mode="60">60s</button>
    </div>
    <div class="mode-group">
      <button class="mode-btn" data-mode="words50">50 words</button>
      <button class="mode-btn" data-mode="zen">zen</button>
    </div>
    <div class="mode-group">
      <button class="mode-btn primary" data-mode="daily">daily</button>
    </div>
  </div>
  <button class="mode-btn" id="view-lb">leaderboard</button>
</div>

<div id="game-screen" class="screen hidden">
  <div id="game-stats"><span class="stat-label">wpm</span><span id="gs-wpm">0</span><span class="stat-sep">·</span><span class="stat-label">acc</span><span id="gs-acc">100</span><span class="stat-sep">·</span><span class="stat-label">raw</span><span id="gs-raw">0</span><span class="stat-sep">·</span><span id="gs-mode-label"></span><span class="stat-sep">·</span><span id="gs-timer">—</span></div>
  <canvas id="game-canvas" tabindex="0"></canvas>
  <div id="progress-line"><div id="progress-line-fill"></div></div>
</div>

<div id="combo-display"></div>

<div id="results" class="screen hidden prepare">
  <div id="result-content">
    <h2 id="result-title">run complete</h2>
    <div class="result-grid">
      <div class="result-item"><div class="rlabel">wpm</div><div class="rvalue green" id="r-wpm">0</div></div>
      <div class="result-item"><div class="rlabel">raw</div><div class="rvalue gold" id="r-raw">0</div></div>
      <div class="result-item"><div class="rlabel">accuracy</div><div class="rvalue green" id="r-acc">0%</div></div>
      <div class="result-item"><div class="rlabel">time</div><div class="rvalue" id="r-time">0s</div></div>
      <div class="result-item"><div class="rlabel">correct</div><div class="rvalue green" id="r-correct">0</div></div>
      <div class="result-item"><div class="rlabel">errors</div><div class="rvalue red" id="r-errors">0</div></div>
    </div>
    <div class="sparkline-wrap"><div class="slabel">wpm over time</div><canvas id="sparkline"></canvas></div>
    <div class="result-actions">
      <button id="retry-btn"><span data-feather="refresh-cw"></span>retry</button>
      <button id="home-btn"><span data-feather="home"></span>home</button>
      <button id="lb-btn" class="primary"><span data-feather="bar-chart-2"></span>leaderboard</button>
    </div>
  </div>
</div>

<div id="leaderboard" class="screen hidden">
  <h2>leaderboard</h2>
  <div class="lb-controls">
    <button class="active" data-sort="wpm">wpm</button>
    <button data-sort="acc">accuracy</button>
    <button data-sort="date">recent</button>
    <button id="lb-back"><span data-feather="arrow-left"></span>back</button>
  </div>
  <table class="lb-table">
    <thead><tr><th>#</th><th>wpm</th><th>acc</th><th>mode</th><th>date</th></tr></thead>
    <tbody id="lb-body"></tbody>
  </table>
  <div class="empty-state hidden" id="lb-empty">no runs yet — start typing!</div>
  <button class="clear-btn hidden" id="clear-lb">clear all history</button>
</div>

<button id="settings-trigger" title="settings (⌘K)"><span data-feather="settings"></span></button>
<div id="app-footer">— · —</div>

<div id="settings-overlay"></div>
<div id="settings-drawer">
  <button class="close-btn" id="settings-close"><span data-feather="x"></span></button>
  <h3>settings</h3>
  <div class="setting-group"><div class="sglabel">theme</div>
    <div class="theme-presets">
      <button class="tp-adept active" data-theme="paper" title="paper"></button>
      <button class="tp-dusk" data-theme="ink" title="ink"></button>
      <button class="tp-mint" data-theme="sage" title="sage"></button>
      <button class="tp-clay" data-theme="clay" title="clay"></button>
    </div>
    <div class="custom-color-row">
      <label>accent</label><input type="color" id="c-accent" value="#5b7b7a">
      <label>correct</label><input type="color" id="c-correct" value="#7a9a6e">
      <label>error</label><input type="color" id="c-error" value="#b5766a">
    </div>
  </div>
  <div class="setting-group"><div class="sglabel">font</div>
    <div class="font-pair-select">
      <button class="active" data-pair="0">JetBrains Mono + Space Grotesk</button>
      <button data-pair="1">Berkeley Mono + Söhne</button>
      <button data-pair="2">IBM Plex Mono + Inter</button>
      <button data-pair="3">Fira Code + DM Sans</button>
    </div>
  </div>
  <div class="setting-group"><div class="sglabel">caret</div>
    <div class="caret-styles">
      <button class="active" data-caret="block">▋ block</button>
      <button data-caret="line">▏ line</button>
      <button data-caret="underline">‗ underline</button>
    </div>
  </div>
  <div class="setting-group"><div class="sglabel">sound</div>
    <div class="font-pair-select" id="sound-packs">
      <button data-pack="-1">off</button>
      <button class="active" data-pack="0">cherry mx blue</button>
      <button data-pack="1">cherry mx brown</button>
    </div>
  </div>
</div>

}

let dbInstance = null;
async function getDB() {
  if (dbInstance) return dbInstance;
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('TypingChallenge', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('runs')) {
        const s = db.createObjectStore('runs', { keyPath: 'id', autoIncrement: true });
        s.createIndex('mode','mode'); s.createIndex('wpm','wpm'); s.createIndex('date','date'); s.createIndex('dailySeed','dailySeed');
      }
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
    };
    req.onsuccess = () => { dbInstance = req.result; resolve(dbInstance); };
    req.onerror = () => reject(req.error);
  });
}
async function saveRun(run) {
  const db = await getDB();
  const tx = db.transaction('runs','readwrite');
  tx.objectStore('runs').add({
    wpm: Math.round(run.wpm), raw: Math.round(run.raw||0), accuracy: Math.round(run.accuracy),
    mode: run.mode, duration: run.duration, correct: run.correct, errors: run.errors, total: run.total,
    date: Date.now(), dailySeed: run.dailySeed||null
  });
  return new Promise(r => tx.oncomplete = () => r());
}
async function getAllRuns() {
  const db = await getDB();
  return new Promise(resolve => {
    db.transaction('runs','readonly').objectStore('runs').getAll().onsuccess = e => resolve(e.target.result);
  });
}
async function clearRuns() {
  const db = await getDB();
  return new Promise(resolve => { db.transaction('runs','readwrite').objectStore('runs').clear().onsuccess = () => resolve(); });
}
async function getDailyRun(seed) {
  const all = await getAllRuns(); return all.find(r => r.dailySeed === seed) || null;
}
async function saveSetting(key, val) {
  const db = await getDB();
  db.transaction('settings','readwrite').objectStore('settings').put({ key, value: JSON.stringify(val) });
}
async function loadSettings() {
  const db = await getDB();
  return new Promise(resolve => {
    const req = db.transaction('settings','readonly').objectStore('settings').getAll();
    req.onsuccess = () => { const m={}; for(const r of req.result) m[r.key]=JSON.parse(r.value); resolve(m); };
  });
}

//  SPRING PHYSICS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

//  GAME STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let audioCtx = null;

  { name:'cherry mx blue', correctFreq:1800, errorFreq:300, correctDur:.03, errorDur:.07, correctType:'square', errorType:'sawtooth', vol:.04 },

  const idx = settings.soundPack;
  if (idx < 0 || idx >= SOUND_PACKS.length) return;

    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        if (wi>0) tx += this.charW;
        if (gwi === state.wordIndex) { cTX = tx + state.charIndex * this.charW; cTY = try_; found = true; break; }
        tx += row[wi].length * this.charW; gwi++;
      }
      if (found) break; try_ += this.lineH;
    }
    this.caretX.setTarget(cTX - scrollY); this.caretY.setTarget(cTY - scrollY);
    this.caretX.update(dt); this.caretY.update(dt);

    const cs = settings.caretStyle;
    const caretActive = state.startTime && !state.isFinished;

    if (caretActive) {
      ctx.fillStyle = cAccent;
      const cx = this.caretX.value, cy = this.caretY.value;
      if (cs === 'block') ctx.fillRect(cx-1, cy-1, this.charW+2, this.fontSize+2);
      else if (cs === 'line') ctx.fillRect(cx-1, cy, 2, this.fontSize);
      else if (cs === 'underline') ctx.fillRect(cx-1, cy+this.fontSize-3, this.charW, 2);
    }

    gwi = 0; try_ = this.padY;
    for (const row of rows) {
      let tx = this.padX;
      for (let wi=0;wi<row.length;wi++) {
        const word = row[wi];
        const isCur = gwi === state.wordIndex;
        const isPast = gwi < state.wordIndex;
        if (wi>0) tx += this.charW;
        const wordX = tx, wordY = try_;

        if (flashMap[gwi]) {
          const f = flashMap[gwi]; const a = RM?0:1-f.progress;
          ctx.fillStyle = f.correct ? `rgba(122,154,110,${.1*a})` : `rgba(181,118,106,${.1*a})`;
          ctx.fillRect(wordX-2, wordY-1, word.length*this.charW+4, this.fontSize+2);
        }

        for (let ci=0;ci<word.length;ci++) {
          const ch = word[ci]; let color;
          if (isPast) {
            const r = state.results[gwi]?.[ci];
            color = r === 'correct' ? cCorrect : r === 'incorrect' ? cError : cDim;
          } else if (isCur) {
            const r = state.results[gwi]?.[ci];
            if (r === 'correct') color = cCorrect;
            else if (r === 'incorrect') color = cError;
            else color = cDim;
            if (cs === 'block' && caretActive && ci === state.charIndex && r == null) color = cSurface;
          } else color = cDim;
          ctx.fillStyle = color; ctx.fillText(ch, tx, try_); tx += this.charW;
        }
        gwi++;
      }
      try_ += this.lineH;
    }
    ctx.restore();

    if (totalH > viewH) {
      const dots=4,dotR=3,gap=8; const sx_=w-16,sy_=(viewH - dots*(dotR*2+gap))/2;
      for (let i=0;i<dots;i++) {
        const t=i/(dots-1), vs=scrollY/totalH, ve=(scrollY+viewH)/totalH;
        ctx.fillStyle = t>=vs&&t<=ve ? cDim : cSurface;
        ctx.beginPath(); ctx.arc(sx_, sy_+i*(dotR*2+gap), dotR, 0, Math.PI*2); ctx.fill();
      }
    }
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GAME CONTROLLER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const renderer = new Renderer(document.getElementById('game-canvas'));
let gameState = null;
let anims = { flashes:[], comboCount:0, comboElapsed:0 };
let rafId=null, lastFrameTime=0, pendingEnd=false;
let wpmSamples=[], sampleTimer=0;
let wpmNum = new AnimatedNum(0,6), rawNum = new AnimatedNum(0,6), accNum = new AnimatedNum(100,6);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  const nav = document.getElementById('nav-bar');
  nav.style.display = (id === 'game-screen' || id === 'results') ? 'flex' : 'none';
}

async function startGame(mode) {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  pendingEnd=false; wpmSamples=[]; sampleTimer=0;
  wpmNum = new AnimatedNum(0,6); rawNum = new AnimatedNum(0,6); accNum = new AnimatedNum(100,6);

  if (mode === 'daily') {
    const seed = dailySeed(); const existing = await getDailyRun(seed);
    if (existing) { showDailyResult(existing); return; }
    gameState = new GameState(generateWords('daily',seed), 'daily');
  } else gameState = new GameState(generateWords(mode,null), mode);

  anims = { flashes:[], comboCount:0, comboElapsed:0 }; lastFrameTime=0;

  document.getElementById('gs-wpm').textContent='0';
  document.getElementById('gs-raw').textContent='0';
  document.getElementById('gs-acc').textContent='100';
  document.getElementById('gs-timer').textContent = gameState.isTimed ? String(gameState.duration) : gameState.isZen ? '∞' : '—';

  const mLbl = gameState.isDaily ? 'daily' : gameState.isZen ? 'zen' : gameState.mode === 'words50' ? '50w' : gameState.mode+'s';
  document.getElementById('gs-mode-label').textContent = mLbl;

  document.getElementById('progress-line').classList.remove('visible');
  document.getElementById('game-stats').classList.remove('visible');
  renderer.render(gameState, anims, 0);
  showScreen('game-screen');
  setTimeout(() => {
    document.getElementById('game-stats').classList.add('visible');
    document.getElementById('progress-line').classList.add('visible');
  }, 50);
  document.getElementById('game-canvas').focus();
  lastFrameTime = performance.now(); loop(lastFrameTime);
}

function loop(ts) {
  if (!gameState) return;
  const rawDt = lastFrameTime ? (ts-lastFrameTime)/1000 : 0;
  const dt = Math.min(rawDt, .1);
  lastFrameTime = ts;

  if (gameState.startTime && !gameState.isFinished) {
    if (gameState.tick(dt)) { endGame(); return; }
    updateDisplay(dt);
  }
  if (gameState.startTime && !gameState.isFinished) {
    sampleTimer += dt;
    if (sampleTimer >= .5) { sampleTimer=0; wpmSamples.push({t:gameState.getStats().elapsed, wpm:gameState.getStats().wpm}); }
  }
  updateAnimations(dt);
  renderer.render(gameState, anims, dt);

  if (pendingEnd) { pendingEnd=false; endGame(); return; }
  rafId = requestAnimationFrame(loop);
}

function updateDisplay(dt) {
  const s = gameState.getStats();
  wpmNum.setTarget(s.wpm); rawNum.setTarget(s.raw); accNum.setTarget(s.accuracy);
  wpmNum.update(dt); rawNum.update(dt); accNum.update(dt);
  document.getElementById('gs-wpm').textContent = wpmNum.value;
  document.getElementById('gs-raw').textContent = rawNum.value;
  document.getElementById('gs-acc').textContent = accNum.value;
  if (gameState.isTimed) document.getElementById('gs-timer').textContent = Math.ceil(gameState.timeLeft);
  document.getElementById('progress-line-fill').style.width = Math.min(100, gameState.progress*100)+'%';
}

function triggerFlash(wordIdx, correct) {
  anims.flashes.push({wordIdx, correct, progress:0});
  if (anims.flashes.length > 10) anims.flashes.shift();
}
function triggerCombo(count) {
  const el = document.getElementById('combo-display');
  el.textContent = (count>=10?'🔥 ':'✓ ')+count;
  el.style.color = count>=10 ? 'var(--error)' : 'var(--ink-muted)';
  anims.comboCount=count; anims.comboElapsed=.8;
  el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1)';
}
function updateAnimations(dt) {
  anims.flashes = anims.flashes.filter(f => { f.progress += dt*5; return f.progress<1; });
  if (anims.comboElapsed > 0) {
    anims.comboElapsed -= dt;
    const el = document.getElementById('combo-display');
    if (anims.comboElapsed<=0) { el.style.opacity='0'; el.style.transform='translate(-50%,-50%) scale(.8)'; anims.comboCount=0; }
    else { const p=Math.min(1,anims.comboElapsed/.8); el.style.opacity=String(p); }
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('home').classList.contains('hidden')) return;
    if (gameState && !gameState.isFinished && !document.getElementById('game-screen').classList.contains('hidden')) {
      if (confirm('exit current run?')) { endGameEarly(); }
      return;
    }
    showScreen('home'); return;
  }
  if (document.getElementById('game-screen').classList.contains('hidden')) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (gameState && !gameState.isFinished) { gameState.backspace(); updateDisplay(.016); }
    return;
  }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey && e.key !== ' ') {
    e.preventDefault();
    if (!gameState || gameState.isFinished) return;
    const res = gameState.typeChar(e.key);
    playClick(res.correct);
    updateDisplay(.016);
    const fi = gameState.wordIndex>0 && gameState.charIndex===0 ? gameState.wordIndex-1 : gameState.wordIndex;
    triggerFlash(fi, res.correct);
    if (res.wordCompleted && gameState.consecutiveCorrectWords>0 && gameState.consecutiveCorrectWords%5===0) triggerCombo(gameState.consecutiveCorrectWords);
    if (gameState.isFinished) pendingEnd=true;
  }
});
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggleSettings(); }
});

function drawSparkline() {
  const c = document.getElementById('sparkline');
  const W = Math.min(c.parentElement.getBoundingClientRect().width, 520), H = 40;
  const dpr = window.devicePixelRatio||1;
  c.width = W*dpr; c.height = H*dpr; c.style.width=W+'px'; c.style.height=H+'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cDim = getComputedStyle(document.documentElement).getPropertyValue('--ink-muted').trim()||'#8A8880';
  const cAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#5B7B7A';
  if (wpmSamples.length < 2) {
    ctx.fillStyle=cDim; ctx.font='11px Space Grotesk,sans-serif'; ctx.textAlign='center';
    ctx.fillText('not enough data', W/2, H/2+4); return;
  }
  const pts=wpmSamples, maxW=Math.max(...pts.map(p=>p.wpm),1);
  const P=4,pw=W-P*2,ph=H-P*2;
  ctx.beginPath();
  for(let i=0;i<pts.length;i++){const x=P+(i/(pts.length-1))*pw,y=P+ph-(pts[i].wpm/maxW)*ph;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=cAccent; ctx.lineWidth=1.5; ctx.stroke();
  ctx.lineTo(P+pw,P+ph); ctx.lineTo(P,P+ph); ctx.closePath();
  const g=ctx.createLinearGradient(0,P,0,P+ph); g.addColorStop(0,'rgba(91,123,122,0.12)'); g.addColorStop(1,'rgba(91,123,122,0.01)');
  ctx.fillStyle=g; ctx.fill();
  ctx.fillStyle=cDim; ctx.font='8px Space Grotesk,sans-serif'; ctx.textAlign='right';
  ctx.fillText(Math.round(maxW)+'wpm', W-P, P+9);
}

function endGame() {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  const s = gameState.getStats();
  document.getElementById('r-wpm').textContent = Math.round(s.wpm);
  document.getElementById('r-raw').textContent = Math.round(s.raw);
  document.getElementById('r-acc').textContent = Math.round(s.accuracy)+'%';
  document.getElementById('r-time').textContent = Math.round(s.elapsed)+'s';
  document.getElementById('r-correct').textContent = s.correct;
  document.getElementById('r-errors').textContent = s.errors;
  document.getElementById('result-title').textContent = gameState.isDaily ? 'daily challenge complete' : 'run complete';
  const rs = document.getElementById('results');
  rs.classList.add('prepare'); rs.classList.remove('go');
  showScreen('results');
  requestAnimationFrame(() => { requestAnimationFrame(() => { rs.classList.remove('prepare'); rs.classList.add('go'); }); });
  drawSparkline();
  saveRun({
    wpm:s.wpm, raw:s.raw, accuracy:s.accuracy, mode:gameState.mode,
    duration:gameState.isTimed ? gameState.duration : s.elapsed,
    correct:s.correct, errors:s.errors, total:s.total, dailySeed:gameState.dailySeed
  }).catch(()=>{});
}

function endGameEarly() {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  gameState.isFinished = true;
  gameState.endTime = performance.now();
  showScreen('home');
}

function showDailyResult(run) {
  document.getElementById('r-wpm').textContent = run.wpm;
  document.getElementById('r-raw').textContent = run.raw||'—';
  document.getElementById('r-acc').textContent = run.accuracy+'%';
  document.getElementById('r-time').textContent = Math.round(run.duration)+'s';
  document.getElementById('r-correct').textContent = run.correct;
  document.getElementById('r-errors').textContent = run.errors;
  document.getElementById('result-title').textContent = "today's daily done";
  const rs = document.getElementById('results');
  rs.classList.add('prepare'); rs.classList.remove('go');
  showScreen('results');
  requestAnimationFrame(() => { requestAnimationFrame(() => { rs.classList.remove('prepare'); rs.classList.add('go'); }); });
  drawSparkline();
}

let settingsOpen = false;
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-overlay').classList.toggle('open', settingsOpen);
  document.getElementById('settings-drawer').classList.toggle('open', settingsOpen);
}
document.getElementById('settings-trigger').addEventListener('click', toggleSettings);
document.getElementById('settings-close').addEventListener('click', toggleSettings);
document.getElementById('settings-overlay').addEventListener('click', toggleSettings);
document.querySelectorAll('.theme-presets button').forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));
document.querySelectorAll('.font-pair-select button').forEach(btn => btn.addEventListener('click', () => applyFontPair(parseInt(btn.dataset.pair))));
document.querySelectorAll('.caret-styles button').forEach(btn => btn.addEventListener('click', () => applyCaretStyle(btn.dataset.caret)));
document.querySelectorAll('#sound-packs button').forEach(btn => btn.addEventListener('click', () => applySoundPack(parseInt(btn.dataset.pack))));
document.getElementById('c-accent').addEventListener('input', e => applyCustomColor('accent', e.target.value));
document.getElementById('c-correct').addEventListener('input', e => applyCustomColor('correct', e.target.value));
document.getElementById('c-error').addEventListener('input', e => applyCustomColor('error', e.target.value));

document.getElementById('nav-home').addEventListener('click', () => {
  if (!document.getElementById('home').classList.contains('hidden')) return;
  if (gameState && !gameState.isFinished && !document.getElementById('game-screen').classList.contains('hidden')) {
    if (!confirm('exit current run?')) return; endGameEarly();
  } else showScreen('home');
});
document.getElementById('nav-lb').addEventListener('click', async () => {
  if (gameState && !gameState.isFinished && !document.getElementById('game-screen').classList.contains('hidden')) {
    if (!confirm('exit current run?')) return; endGameEarly();
  }
  showScreen('leaderboard'); await refreshLB();
});

let lbSort = 'wpm';
async function refreshLB() {
  const runs = await getAllRuns();
  const tbody = document.getElementById('lb-body');
  const empty = document.getElementById('lb-empty');
  const clearBtn = document.getElementById('clear-lb');
  tbody.innerHTML = '';
  if (!runs.length) { empty.classList.remove('hidden'); clearBtn.classList.add('hidden'); return; }
  empty.classList.add('hidden'); clearBtn.classList.remove('hidden');
  const sorted = [...runs].sort((a,b) => { if (lbSort==='wpm') return b.wpm-a.wpm; if (lbSort==='acc') return b.accuracy-a.accuracy; return b.date-a.date; });
  for (let i=0;i<Math.min(sorted.length,50);i++) {
    const r=sorted[i]; const d=new Date(r.date);
    const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const ms=r.mode==='daily'?'daily':r.mode==='words50'?'50w':r.mode==='zen'?'zen':r.mode+'s';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="rank">${i+1}</td><td>${r.wpm}</td><td>${r.accuracy}%</td><td>${ms}</td><td>${ds}</td>`;
    tbody.appendChild(tr);
  }
}

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => startGame(btn.dataset.mode)));
document.getElementById('view-lb').addEventListener('click', async () => { showScreen('leaderboard'); await refreshLB(); });
document.getElementById('lb-back').addEventListener('click', () => showScreen('home'));
document.querySelectorAll('#leaderboard .lb-controls button[data-sort]').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('#leaderboard .lb-controls button[data-sort]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); lbSort=btn.dataset.sort; await refreshLB();
  });
});
document.getElementById('clear-lb').addEventListener('click', async () => { if (confirm('clear all history?')) { await clearRuns(); await refreshLB(); } });
document.getElementById('retry-btn').addEventListener('click', () => { if(gameState) startGame(gameState.mode); });
document.getElementById('home-btn').addEventListener('click', () => { if (gameState) { gameState.isFinished=true; } showScreen('home'); });
document.getElementById('lb-btn').addEventListener('click', async () => { showScreen('leaderboard'); await refreshLB(); });
document.getElementById('game-screen').addEventListener('click', e => {
  if (e.target.tagName!=='BUTTON' && e.target.tagName!=='CANVAS') document.getElementById('game-canvas').focus();
});

async function init() {
  feather.replace();
  const s = await loadSettings();
  if (s.theme) applyTheme(s.theme); else applyTheme('paper');
  if (s.fontPair!=null) applyFontPair(s.fontPair); else applyFontPair(0);
  if (s.caretStyle) applyCaretStyle(s.caretStyle); else applyCaretStyle('block');
  if (s.soundPack!=null) applySoundPack(s.soundPack); else applySoundPack(-1);
  if (s.accent) applyCustomColor('accent', s.accent);
  if (s.correct) applyCustomColor('correct', s.correct);
  if (s.error) applyCustomColor('error', s.error);
  settingsLoaded = true;
  document.getElementById('nav-bar').style.display = 'none';
  showScreen('home');
}
init();
</script>
